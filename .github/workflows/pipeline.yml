name: OOBT Seaborn CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Konfiguracja Pythona
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov seaborn pandas matplotlib scipy
          # Sprawdza obie wersje nazwy:
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f Requirements.txt ]; then pip install -r Requirements.txt; fi

      - name: Wykonanie wszystkich testów (Pytest)
        # Uruchamiamy testy z folderu tests/, generując raport pokrycia kodu
        run: |
          pytest tests/ \
            --doctest-modules \
            --junitxml=report.xml \
            --cov=. \
            --cov-report=xml

      - name: Archiwizacja wyeksportowanych plików
        # Skoro masz test_file_export.py, pewnie generują się tam pliki.
        # Ten krok zapisuje je, żebyś mógł je przejrzeć po zakończeniu pipeline'u.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-exports-and-logs
          path: |
            *.png
            *.pdf
            report.xml
